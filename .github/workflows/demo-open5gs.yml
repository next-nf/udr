name: demo-open5gs

# D2a interop gate: a real Open5GS MME (freeDiameter) peers with our HSS over S6a.

on:
  push:
    branches: [main]
    paths:
      - 'demos/open5gs-s6a/**'
      - 'config/**'
      - '.github/workflows/demo-open5gs.yml'
  pull_request:
    paths:
      - 'demos/open5gs-s6a/**'
      - 'config/**'
      - '.github/workflows/demo-open5gs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: demo-open5gs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open5gs-s6a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Load the SCTP module (the Open5GS MME S1AP socket needs it)
        run: sudo modprobe sctp && grep -i sctp /proc/net/protocols
      - name: Run the Open5GS S6a peering demo
        working-directory: demos/open5gs-s6a
        run: ./run.sh
