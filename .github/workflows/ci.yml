name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    # MongoDB as a service container. The mongo-backed CT suites
    # (udr_db_mongo_conformance_SUITE, udr_hss_dist_SUITE) detect CI=true
    # (set automatically by GitHub) and use this service instead of starting
    # their own podman container. See apps/udr_db_mongo/test/udr_mongo_ct.erl.
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s

    env:
      MONGO_HOST: 127.0.0.1
      MONGO_PORT: 27017

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '29'
          rebar3-version: '3.26.0'

      - name: Cache rebar3 cache, _build and the dialyzer PLT
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: ${{ runner.os }}-otp29-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp29-

      - name: Compile
        run: rebar3 compile

      - name: Dialyzer
        run: rebar3 dialyzer

      # GitHub sets CI=true, so the mongo suites run against the service above.
      - name: Common Test
        run: rebar3 ct

      - name: Release assembly sanity (covers PRs, which don't build the image)
        run: rebar3 as docker release

      - name: Upload CT logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ct-logs
          path: _build/test/logs
          if-no-files-found: ignore

  image:
    # Build & push the container only after tests pass, and never on PRs:
    # push to main -> :latest (+ :sha); a v* tag -> semver tags.
    needs: test
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/next-nf/udr
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
