name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Least privilege by default; the image job below opts into packages:write.
permissions:
  contents: read

# Cancel superseded runs on the same ref (distinct tags keep distinct groups,
# so a release build is never cancelled by another).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    # MongoDB as a service container. The mongo-backed CT suites
    # (udr_db_mongo_conformance_SUITE, udr_hss_dist_SUITE) detect CI=true
    # (set automatically by GitHub) and use this service instead of starting
    # their own podman container. See apps/udr_db_mongo/test/udr_mongo_ct.erl.
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s

    env:
      MONGO_HOST: 127.0.0.1
      MONGO_PORT: 27017

    steps:
      # Pinned to commit SHAs (supply-chain hardening); version in trailing comment.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: '29'
          rebar3-version: '3.26.0'

      - name: Cache rebar3 cache, _build and the dialyzer PLT
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: ${{ runner.os }}-otp29-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp29-

      - name: Compile
        run: rebar3 compile

      - name: Dialyzer
        run: rebar3 dialyzer

      # GitHub sets CI=true, so the mongo suites run against the service above.
      # --sname makes the CT node distributed, which the multi-node peer suites
      # (udr_hss_dist_SUITE, udr_cluster_dist_SUITE) require -- they skip cleanly
      # rather than fail when the origin is not alive, so this is what runs them.
      - name: Common Test
        run: rebar3 ct --sname test

      - name: Release assembly sanity (covers PRs, which don't build the image)
        run: rebar3 as container release

      # GitHub bills artifacts by their UNCOMPRESSED size and only serves them as
      # a .zip, so upload a single pre-compressed tarball instead of the raw tree.
      - name: Package CT logs on failure
        if: failure()
        run: |
          if [ -d _build/test/logs ]; then
            tar -cJf ct-logs.tar.xz -C _build/test logs
          fi

      - name: Upload CT logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ct-logs
          path: ct-logs.tar.xz
          if-no-files-found: ignore

  # Multi-arch image with podman/buildah (no docker engine, no buildx). Each arch
  # builds natively on its own runner -- no QEMU -- and pushes a throwaway
  # arch-suffixed tag (ghcr.io/next-nf/udr:<sha>-amd64 / -arm64); the manifest job
  # then assembles a multi-arch manifest list under the real tags. The per-arch
  # tags are reaped by the scheduled ghcr-cleanup workflow (non-release images).
  build-amd64:
    needs: test
    if: &image-if >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (linux/amd64)
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          image: udr
          tags: ${{ github.sha }}-amd64
          containerfiles: ./container/Containerfile
          context: .

      # push-to-registry needs the registry separately from the (short) image
      # name; with image=udr + registry=ghcr.io/next-nf the pushed ref is
      # ghcr.io/next-nf/udr:<sha>-amd64 (what the manifest job references).
      - name: Push (linux/amd64)
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          image: udr
          tags: ${{ github.sha }}-amd64
          registry: ghcr.io/next-nf

  build-arm64:
    needs: test
    if: *image-if
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (linux/arm64)
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          image: udr
          tags: ${{ github.sha }}-arm64
          containerfiles: ./container/Containerfile
          context: .

      - name: Push (linux/arm64)
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          image: udr
          tags: ${{ github.sha }}-arm64
          registry: ghcr.io/next-nf

  manifest:
    needs: [build-amd64, build-arm64]
    if: *image-if
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/next-nf/udr
    steps:
      - name: Log in to GHCR
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Final tags (mirrors the old docker/metadata-action set):
      #   sha-<short>           always
      #   latest                main only
      #   <version>, <maj.min>  on v* tags (e.g. v1.2.3 -> 1.2.3, 1.2)
      - name: Compute tags
        id: tags
        run: |
          tags="sha-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="$tags latest"
          fi
          case "${GITHUB_REF}" in
            refs/tags/v*)
              ver="${GITHUB_REF#refs/tags/v}"
              tags="$tags $ver ${ver%.*}"
              ;;
          esac
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Assemble and push multi-arch manifest
        run: |
          buildah manifest create udr
          buildah manifest add udr "docker://${IMAGE}:${GITHUB_SHA}-amd64"
          buildah manifest add udr "docker://${IMAGE}:${GITHUB_SHA}-arm64"
          for t in ${{ steps.tags.outputs.tags }}; do
            echo "Pushing ${IMAGE}:${t}"
            buildah manifest push --all udr "docker://${IMAGE}:${t}"
          done
