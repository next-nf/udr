name: udr-s6a-smoke

services:
  # The HSS, from the published release image (built by the project's CI from
  # container/Containerfile). Binds 0.0.0.0; default in-memory ETS backend.
  hss:
    image: ghcr.io/next-nf/udr:latest
    ports:
      - "8080:8080"   # SBI (Nudr-DR)
      - "8090:8090"   # provisioning API (run.sh seeds the subscriber here)
      - "3868:3868"   # S6a Diameter (the client reaches it over the compose network)

  # The S6a MME client. Started on demand by run.sh (`docker compose run mme`),
  # not by `up`, hence the profile. It reaches the HSS as `hss` on the network.
  mme:
    build:
      context: ../..
      dockerfile: demos/s6a-smoke/mme/Dockerfile
    image: udr-s6a-smoke-mme:demo
    depends_on:
      - hss
    environment:
      HSS_HOST: hss
      HSS_PORT: "3868"
      IMSI: "001010000000001"
      NUM_VECTORS: "2"
    profiles: ["client"]
